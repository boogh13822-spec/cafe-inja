<script>

const WORKER_URL = "https://cafeinjaapi.boogh13822.workers.dev";

let history = [];

// ====== SYSTEM PROMPT ======
const SYS = `
تو دستیار رسمی کافه هستی.

قوانین:
- همیشه فارسی جواب بده
- کاربر را "میهمان" خطاب کن
- اطلاعات غیرمنو را حدس نزن
- فقط از منوی زیر استفاده کن

منو:

☕ نوشیدنی‌های داغ:
- اسپرسو: 180,000
- آمریکانو: 183,000
- لاته: 256,000
- کاپوچینو: 251,000
- موکا: 287,000

🧊 نوشیدنی‌های سرد:
- آیس لاته: 256,000
- موهیتو: 218,000
- لیموناد: 218,000

🍔 غذا:
- برگر: 527,000
- چیزبرگر: 574,000
- پیتزا آلفردو: 786,000
- پاستا آلفردو: 627,000

🍰 دسر:
- تیرامیسو: 259,000
- کروسان: 275,000

اگر چیزی نبود بگو: "متأسفانه در منو موجود نیست"
`;

// ====== نمایش پیام ======
function add(text, cls) {

  const div = document.createElement("div");
  div.className = "msg " + cls;

  div.innerHTML = `
    <div class="bubble">${text.replace(/\n/g, "<br>")}</div>
  `;

  const msgs = document.getElementById("msgs");

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

// ====== فراخوانی هوش مصنوعی ======
async function callAI(text) {

  history.push({
    role: "user",
    content: text
  });

  const res = await fetch(WORKER_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      messages: [
        {
          role: "system",
          content: SYS
        },
        ...history
      ]
    })
  });

  const data = await res.json();

  console.log("API RESPONSE:", data);

  if (!res.ok) {

    if (data?.details?.error?.message) {
      throw new Error(data.details.error.message);
    }

    if (data?.error?.message) {
      throw new Error(data.error.message);
    }

    throw new Error("خطای سرور");
  }

  let reply = "";

  if (
    data &&
    data.choices &&
    data.choices[0] &&
    data.choices[0].message &&
    data.choices[0].message.content
  ) {

    reply = data.choices[0].message.content;

  } else {

    console.error("Unexpected response:", data);

    reply = "پاسخی از مدل دریافت نشد";
  }

  history.push({
    role: "assistant",
    content: reply
  });

  return reply;
}

// ====== ارسال ======
async function send() {

  const input = document.getElementById("chat");

  const text = input.value.trim();

  if (!text) return;

  input.value = "";

  add(text, "user");

  try {

    const reply = await callAI(text);

    add(reply, "bot");

  } catch (err) {

    console.error(err);

    add("❌ " + err.message, "bot");
  }
}

</script>
