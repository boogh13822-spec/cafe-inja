<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کافه اینجا - دستیار</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Vazirmatn', sans-serif;
  background: #080604;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 12px;
}

.app {
  width: 100%;
  max-width: 460px;
  height: 92vh;
  max-height: 760px;
  background: #0f0b07;
  border-radius: 22px;
  border: 1px solid #2a1c0e;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ───── HEADER ───── */
.header {
  background: #130e08;
  border-bottom: 1px solid #2a1c0e;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 13px;
  flex-shrink: 0;
}

.header-icon {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: #1e1409;
  border: 1.5px solid #4a2e14;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.header-title { color: #f0dfc0; font-size: 15px; font-weight: 600; }
.header-sub {
  color: #7a5a38;
  font-size: 11.5px;
  margin-top: 2px;
  display: flex; align-items: center; gap: 5px;
}
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #5aab6a;
}

/* ───── MESSAGES ───── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scrollbar-width: thin;
  scrollbar-color: #2a1c0e transparent;
}
.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-thumb { background: #2a1c0e; border-radius: 3px; }

.msg-wrap { display: flex; flex-direction: column; }
.msg-wrap.user { align-items: flex-start; }
.msg-wrap.bot  { align-items: flex-end; }

.msg-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
}
.msg-wrap.user .msg-row { flex-direction: row-reverse; }

.avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: #1a1108;
  border: 1px solid #3a2510;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
}

.bubble {
  max-width: 78%;
  padding: 10px 14px;
  font-size: 13.5px;
  line-height: 1.9;
  word-break: break-word;
  border-radius: 16px;
}
.bubble.bot {
  background: #1b1208;
  color: #e0caa8;
  border: 1px solid #2e1e0c;
  border-bottom-right-radius: 4px;
}
.bubble.user {
  background: #5c3214;
  color: #f0dfc0;
  border: 1px solid #7a4520;
  border-bottom-left-radius: 4px;
}
.msg-time {
  font-size: 10px;
  color: #4a3522;
  margin-top: 4px;
  padding: 0 36px;
}

/* ───── TYPING ───── */
.typing-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
}
.typing-bubble {
  background: #1b1208;
  border: 1px solid #2e1e0c;
  border-radius: 16px;
  border-bottom-right-radius: 4px;
  padding: 12px 16px;
  display: flex;
  gap: 5px;
  align-items: center;
}
.typing-bubble span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #6a4828;
  animation: blink 1.2s infinite;
}
.typing-bubble span:nth-child(2) { animation-delay: .2s; }
.typing-bubble span:nth-child(3) { animation-delay: .4s; }
@keyframes blink {
  0%, 80%, 100% { opacity: .3; }
  40% { opacity: 1; }
}

/* ───── INPUT AREA ───── */
.input-area {
  background: #130e08;
  border-top: 1px solid #2a1c0e;
  padding: 10px 14px 14px;
  flex-shrink: 0;
}

.quick-btns {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 8px;
}
.quick-btns::-webkit-scrollbar { display: none; }

.qbtn {
  flex-shrink: 0;
  padding: 5px 13px;
  border-radius: 20px;
  border: 1px solid #3a2510;
  background: transparent;
  color: #9a7050;
  font-family: 'Vazirmatn', sans-serif;
  font-size: 11.5px;
  cursor: pointer;
  white-space: nowrap;
  transition: all .18s;
}
.qbtn:hover { background: #1e1408; color: #f0dfc0; border-color: #6a4020; }

.input-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.text-input {
  flex: 1;
  background: #0a0704;
  border: 1px solid #2a1c0e;
  border-radius: 25px;
  padding: 10px 16px;
  color: #f0dfc0;
  font-family: 'Vazirmatn', sans-serif;
  font-size: 13.5px;
  outline: none;
  transition: border-color .2s;
}
.text-input::placeholder { color: #4a3522; }
.text-input:focus { border-color: #6a4020; }
.text-input:disabled { opacity: .5; }

.send-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: #7a3e18;
  border: none;
  color: #f0dfc0;
  font-size: 17px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .18s;
}
.send-btn:hover { background: #9a5022; }
.send-btn:disabled { background: #2a1c0e; cursor: not-allowed; }
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="header-icon">☕</div>
    <div>
      <div class="header-title">کافه اینجا</div>
      <div class="header-sub">
        <span class="dot"></span>
        <span>دستیار آنلاین</span>
      </div>
    </div>
  </div>

  <div class="messages" id="msgs"></div>

  <div class="input-area">
    <div class="quick-btns">
      <button class="qbtn" onclick="quickSend('منوی کامل رو نشونم بده')">📋 منو</button>
      <button class="qbtn" onclick="quickSend('نوشیدنی‌های داغ چی دارید؟')">☕ نوشیدنی داغ</button>
      <button class="qbtn" onclick="quickSend('نوشیدنی سرد چی دارید؟')">🧊 نوشیدنی سرد</button>
      <button class="qbtn" onclick="quickSend('غذاها چیه؟')">🍔 غذا</button>
      <button class="qbtn" onclick="quickSend('دسر چی دارید؟')">🍰 دسر</button>
    </div>
    <div class="input-row">
      <input
        class="text-input"
        id="chat"
        placeholder="سوال خود را بنویسید..."
        onkeydown="if(event.key==='Enter' && !event.shiftKey) sendMsg()"
      />
      <button class="send-btn" id="sendBtn" onclick="sendMsg()">➤</button>
    </div>
  </div>

</div>

<script>
const WORKER_URL = "https://cafeinjaapi.boogh13822.workers.dev/";

const SYSTEM_PROMPT = `تو دستیار رسمی کافه اینجا هستی. با لحن مودب و صمیمی پاسخ بده.

دستورالعمل‌های مهم:
۱. همیشه و فقط به فارسی پاسخ بده
۲. مهمانان را "میهمان عزیز" خطاب کن
۳. فقط از اطلاعات منوی زیر استفاده کن — هیچ‌چیزی از خودت اضافه نکن
۴. اگر سوال درباره چیزی خارج از منو بود، بگو: «این مورد در منوی ما وجود ندارد»
۵. پاسخ‌ها کوتاه، واضح و دوستانه باشند
۶. فقط پاسخ نهایی را بنویس

━━━━━━━━━━━━━━━━━━━━
منوی کافه اینجا
━━━━━━━━━━━━━━━━━━━━

☕ نوشیدنی داغ:
• اسپرسو — ۱۸۰,۰۰۰ تومان
• آمریکانو — ۱۸۳,۰۰۰ تومان
• لاته — ۲۵۶,۰۰۰ تومان
• کاپوچینو — ۲۵۱,۰۰۰ تومان
• موکا — ۲۸۷,۰۰۰ تومان

🧊 نوشیدنی سرد:
• آیس لاته — ۲۵۶,۰۰۰ تومان
• موهیتو — ۲۱۸,۰۰۰ تومان
• لیموناد — ۲۱۸,۰۰۰ تومان

🍔 غذا:
• برگر — ۵۲۷,۰۰۰ تومان
• چیزبرگر — ۵۷۴,۰۰۰ تومان
• پیتزا آلفردو — ۷۸۶,۰۰۰ تومان
• پاستا آلفردو — ۶۲۷,۰۰۰ تومان

🍰 دسر:
• تیرامیسو — ۲۵۹,۰۰۰ تومان
• کروسان — ۲۷۵,۰۰۰ تومان`;

let history = [];
let busy = false;

function now() {
  const d = new Date();
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function addMsg(text, who) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + who;

  const row = document.createElement('div');
  row.className = 'msg-row';

  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = who === 'bot' ? '☕' : '👤';

  const bub = document.createElement('div');
  bub.className = 'bubble ' + who;
  bub.innerHTML = text.replace(/\n/g, '<br>');

  row.appendChild(av);
  row.appendChild(bub);

  const t = document.createElement('div');
  t.className = 'msg-time';
  t.textContent = now();

  wrap.appendChild(row);
  wrap.appendChild(t);

  const msgs = document.getElementById('msgs');
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('msgs');
  const wrap = document.createElement('div');
  wrap.id = 'typing';
  wrap.className = 'msg-wrap bot';

  const row = document.createElement('div');
  row.className = 'typing-row';

  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = '☕';

  const bub = document.createElement('div');
  bub.className = 'typing-bubble';
  bub.innerHTML = '<span></span><span></span><span></span>';

  row.appendChild(av);
  row.appendChild(bub);
  wrap.appendChild(row);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function setLoading(v) {
  busy = v;
  document.getElementById('sendBtn').disabled = v;
  document.getElementById('chat').disabled = v;
}

function cleanText(t) {
  // حذف thinking tags و متن‌های اضافه
  return t
    .replace(/<think>[\s\S]*?<\/think>/gi, '')
    .replace(/\[thinking\][\s\S]*?\[\/thinking\]/gi, '')
    .replace(/^(thinking|فکر|در نظر)[:\s].*/gim, '')
    .trim();
}

async function callAPI(text) {
  history.push({ role: 'user', content: text });

  const res = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages: [
        { role: 'system', content: SYSTEM_PROMPT },
        ...history
      ],
      max_tokens: 600,
      temperature: 0.4
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || 'خطای سرور ' + res.status);
  }

  const data = await res.json();
  const reply = cleanText(data?.choices?.[0]?.message?.content || 'پاسخی دریافت نشد');

  history.push({ role: 'assistant', content: reply });
  return reply;
}

async function sendMsg() {
  if (busy) return;
  const input = document.getElementById('chat');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  addMsg(text, 'user');
  setLoading(true);
  showTyping();

  try {
    const reply = await callAPI(text);
    hideTyping();
    addMsg(reply, 'bot');
  } catch (e) {
    hideTyping();
    console.error(e);
    addMsg('مشکلی پیش آمد، لطفاً دوباره تلاش کنید.', 'bot');
  }

  setLoading(false);
}

function quickSend(text) {
  if (busy) return;
  document.getElementById('chat').value = text;
  sendMsg();
}

window.onload = () => {
  addMsg('سلام میهمان عزیز ☕\nبه کافه اینجا خوش آمدید!\nچطور می‌تونم کمکتون کنم؟', 'bot');
};
</script>
</body>
</html>
