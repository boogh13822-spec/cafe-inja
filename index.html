<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com https://cafeinjaapi.boogh13822.workers.dev; img-src 'self' data:;">
<title>کافه اینجا</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════ TOKENS ══════════════════════ */
:root {
  --bg:        #07050302;
  --bg-s:      #07050300;
  --surface:   #0e0b07;
  --surface2:  #151009;
  --surface3:  #1c1510;
  --border:    #26190a;
  --border2:   #35220e;
  --gold:      #c08830;
  --gold-dim:  #7a5518;
  --gold-glow: rgba(192,136,48,.12);
  --cream:     #f0dfc0;
  --cream-dim: #a88d60;
  --text:      #d8c4a0;
  --text-dim:  #6a4e2c;
  --accent:    #8b4a18;
  --accent-h:  #a85a20;
  --green:     #2a6040;
  --green-dim: #1a4028;
  --red:       #6a2020;
  --r: 20px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Vazirmatn',sans-serif;
  background:radial-gradient(ellipse at top,#1a1005 0%,#070503 60%);
  min-height:100vh;display:flex;justify-content:center;align-items:center;padding:8px;
}

/* ══════════════════════ APP SHELL ══════════════════════ */
.app{
  width:100%;max-width:448px;height:96vh;max-height:840px;
  background:var(--surface);
  border-radius:28px;
  border:1px solid var(--border2);
  display:flex;flex-direction:column;overflow:hidden;
  position:relative;
  box-shadow:0 32px 80px rgba(0,0,0,.7),0 0 0 1px rgba(192,136,48,.06) inset;
}

/* ══════════════════════ HEADER ══════════════════════ */
.header{
  background:linear-gradient(180deg,#1c1408 0%,#100c06 100%);
  border-bottom:1px solid var(--border);
  padding:14px 16px 12px;
  display:flex;align-items:center;gap:12px;flex-shrink:0;
  position:relative;
}
.header::after{
  content:'';position:absolute;bottom:0;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);
}
.logo{
  width:44px;height:44px;border-radius:14px;
  background:radial-gradient(circle at 35% 30%,#2c1c0a,#130e05);
  border:1.5px solid var(--gold-dim);
  display:flex;align-items:center;justify-content:center;
  font-size:21px;flex-shrink:0;
  box-shadow:0 4px 12px rgba(0,0,0,.4),0 0 16px rgba(192,136,48,.08);
}
.header-info{flex:1;min-width:0;}
.header-name{color:var(--cream);font-size:15.5px;font-weight:700;letter-spacing:.3px;}
.header-sub{display:flex;align-items:center;gap:5px;margin-top:2px;}
.dot{width:6px;height:6px;border-radius:50%;background:#4aaa60;flex-shrink:0;animation:dotPulse 2s ease infinite;}
@keyframes dotPulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(74,170,96,.4)}50%{opacity:.7;box-shadow:0 0 0 4px rgba(74,170,96,0)}}
.header-status{color:var(--text-dim);font-size:11px;}

/* ── NAV TABS ── */
.nav{display:flex;gap:5px;flex-shrink:0;}
.nav-btn{
  display:flex;align-items:center;gap:5px;
  padding:6px 11px;border-radius:10px;
  border:1px solid transparent;
  background:transparent;
  color:var(--text-dim);
  font-family:'Vazirmatn',sans-serif;font-size:11.5px;font-weight:500;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.nav-btn:hover{color:var(--cream-dim);background:var(--surface3);}
.nav-btn.active{
  background:linear-gradient(135deg,#2a1a08,#1a1005);
  border-color:var(--border2);color:var(--gold);
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.nav-btn .nb-icon{font-size:13px;}

/* ══════════════════════ VIEWS ══════════════════════ */
.view{display:none;flex:1;overflow:hidden;flex-direction:column;}
.view.active{display:flex;}

/* ══════════════════════ CHAT ══════════════════════ */
.msgs-wrap{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column;}
.msgs{
  flex:1;overflow-y:auto;padding:14px 13px;
  display:flex;flex-direction:column;gap:10px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.msgs::-webkit-scrollbar{width:3px;}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ── Timer Banner ── */
.timer-banner{
  flex-shrink:0;
  margin:10px 13px 0;
  background:linear-gradient(135deg,var(--surface3),var(--surface2));
  border:1px solid var(--gold-dim);border-radius:14px;
  padding:11px 15px;
  display:flex;align-items:center;gap:11px;
}
.tb-icon{font-size:22px;flex-shrink:0;}
.tb-info{flex:1;min-width:0;}
.tb-label{color:var(--text-dim);font-size:10.5px;margin-bottom:1px;}
.tb-val{color:var(--gold);font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;}
.tb-val.ready{color:#4aaa60;font-size:14px;}
.tb-sub{color:var(--text-dim);font-size:10.5px;margin-top:1px;}
@keyframes timerGlow{0%,100%{border-color:var(--gold-dim)}50%{border-color:var(--gold)}}
.timer-banner{animation:timerGlow 3s ease infinite;}

/* ── Bubbles ── */
.msg-wrap{display:flex;flex-direction:column;}
.msg-wrap.user{align-items:flex-start;}
.msg-wrap.bot {align-items:flex-end;}
.msg-row{display:flex;align-items:flex-end;gap:7px;}
.msg-wrap.user .msg-row{flex-direction:row-reverse;}
.av{
  width:27px;height:27px;border-radius:50%;
  background:var(--surface3);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;
}
.bubble{
  max-width:78%;padding:10px 14px;
  font-size:13.5px;line-height:1.9;
  word-break:break-word;border-radius:16px;
}
.bubble.bot{
  background:var(--surface2);color:var(--text);
  border:1px solid var(--border);border-bottom-right-radius:5px;
}
.bubble.user{
  background:linear-gradient(135deg,#5c3010,#3a1e08);
  color:var(--cream);border:1px solid #7a4018;border-bottom-left-radius:5px;
}
.msg-time{font-size:10px;color:var(--text-dim);opacity:.5;margin-top:3px;padding:0 34px;}

/* ── Menu Table in Chat ── */
.chat-menu{
  max-width:92%;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:16px;overflow:hidden;
  font-size:12.5px;
}
.chat-menu-header{
  background:linear-gradient(135deg,#1e1408,#130f06);
  padding:10px 14px;
  display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--border);
}
.cmh-emoji{font-size:18px;}
.cmh-title{color:var(--gold);font-weight:700;font-size:13px;flex:1;}
.cmh-count{color:var(--text-dim);font-size:11px;}
.chat-menu-table{width:100%;border-collapse:collapse;}
.cmt-row{
  display:grid;grid-template-columns:1fr auto;
  padding:9px 14px;
  border-bottom:1px solid var(--border);
  transition:background .15s;
}
.cmt-row:last-child{border-bottom:none;}
.cmt-row:hover{background:var(--surface3);}
.cmt-name{color:var(--text);font-size:13px;font-weight:500;}
.cmt-desc{color:var(--text-dim);font-size:11px;margin-top:2px;line-height:1.5;}
.cmt-price{
  color:var(--gold);font-size:12.5px;font-weight:600;
  white-space:nowrap;padding-right:8px;
  display:flex;align-items:flex-start;justify-content:flex-end;
}
.chat-menu-footer{
  padding:8px 14px;background:var(--surface3);
  text-align:center;color:var(--text-dim);font-size:11px;
}

/* ── Full Menu Card ── */
.chat-full-menu{max-width:94%;}
.fmenu-title{
  color:var(--cream);font-size:13.5px;font-weight:700;
  padding:11px 14px;
  background:linear-gradient(135deg,#1e1408,#130f06);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}

/* ── Typing ── */
.typing-row{display:flex;align-items:flex-end;gap:7px;}
.typing-bub{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:16px;border-bottom-right-radius:5px;
  padding:12px 16px;display:flex;gap:5px;
}
.typing-bub span{
  width:6px;height:6px;border-radius:50%;
  background:var(--gold-dim);animation:blink 1.2s ease infinite;
}
.typing-bub span:nth-child(2){animation-delay:.2s;}
.typing-bub span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}

/* ── Order Confirm Card ── */
.order-confirm{
  background:linear-gradient(135deg,#0e1a0e,#071007);
  border:1px solid #2a4a2a;border-radius:16px;
  padding:14px;max-width:84%;
}
.oc-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #1a3a1a;
}
.oc-title{color:#4aaa60;font-size:13px;font-weight:700;}
.oc-id{color:#2a5a2a;font-size:11px;font-family:monospace;}
.oc-meta{color:#3a8040;font-size:12px;margin-bottom:8px;}
.oc-divider{height:1px;background:#1a3a1a;margin:8px 0;}
.oc-row{display:flex;justify-content:space-between;color:#5a9060;font-size:12px;padding:2px 0;}
.oc-total{display:flex;justify-content:space-between;color:#4aaa60;font-size:13px;font-weight:700;padding-top:8px;border-top:1px solid #1a3a1a;margin-top:4px;}

/* ── Chat Input ── */
.chat-input-area{
  flex-shrink:0;
  background:linear-gradient(180deg,transparent,var(--surface));
  border-top:1px solid var(--border);
  padding:10px 13px 14px;
}

/* Quick Actions */
.qa-row{
  display:flex;align-items:center;gap:7px;
  margin-bottom:8px;
}
.qa-toggle{
  flex-shrink:0;
  width:30px;height:30px;border-radius:50%;
  border:1px solid var(--border2);background:var(--surface2);
  color:var(--text-dim);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.qa-toggle:hover{background:var(--surface3);color:var(--cream-dim);}
.qa-toggle.open{background:var(--accent);border-color:var(--accent);color:var(--cream);}
.qa-chips{
  display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;
  flex:1;
}
.qa-chips::-webkit-scrollbar{display:none;}
.qa-chip{
  flex-shrink:0;
  display:flex;align-items:center;gap:4px;
  padding:5px 10px;border-radius:16px;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--text-dim);
  font-family:'Vazirmatn',sans-serif;font-size:11.5px;font-weight:500;
  cursor:pointer;white-space:nowrap;transition:all .15s;
}
.qa-chip:hover{background:var(--surface3);color:var(--cream-dim);border-color:var(--border2);}
.qa-chip.gold{border-color:var(--gold-dim);color:var(--gold);background:linear-gradient(135deg,#1a1208,#100d06);}
.qa-icon{font-size:12px;}
/* گرید منوهای باز‌شدنی */
.qa-grid{
  display:none;
  grid-template-columns:repeat(3,1fr);
  gap:5px;margin-bottom:8px;
}
.qa-grid.open{display:grid;}
.qa-btn{
  display:flex;align-items:center;gap:5px;
  padding:7px 8px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--text-dim);
  font-family:'Vazirmatn',sans-serif;font-size:11px;font-weight:500;
  cursor:pointer;transition:all .15s;
}
.qa-btn:hover{background:var(--surface3);color:var(--cream-dim);border-color:var(--border2);}
.qa-btn .qi{font-size:13px;}

.input-row{display:flex;gap:8px;align-items:center;}
.chat-inp{
  flex:1;background:#060402;border:1px solid var(--border);
  border-radius:22px;padding:10px 16px;
  color:var(--cream);font-family:'Vazirmatn',sans-serif;font-size:13.5px;
  outline:none;transition:border-color .2s;
}
.chat-inp::placeholder{color:var(--text-dim);}
.chat-inp:focus{border-color:var(--gold-dim);}
.chat-inp:disabled{opacity:.4;}
.send-btn{
  width:42px;height:42px;border-radius:50%;
  background:var(--accent);border:none;color:var(--cream);
  font-size:16px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:background .18s,transform .1s;
}
.send-btn:hover{background:var(--accent-h);transform:scale(1.05);}
.send-btn:disabled{background:var(--border);cursor:not-allowed;transform:none;}

/* ══════════════════════ ORDER ══════════════════════ */
.order-body{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.order-body::-webkit-scrollbar{width:3px;}
.order-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.section{padding:16px 15px 10px;}
.section-head{
  display:flex;align-items:center;gap:8px;
  margin-bottom:14px;
}
.sh-line{flex:1;height:1px;background:var(--border);}
.sh-label{color:var(--gold);font-size:10.5px;font-weight:700;letter-spacing:1.2px;white-space:nowrap;}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-grid .full{grid-column:1/-1;}
.field-label{color:var(--text-dim);font-size:11.5px;margin-bottom:5px;display:block;}
.field-inp{
  width:100%;background:#060402;border:1px solid var(--border);
  border-radius:10px;padding:9px 12px;
  color:var(--cream);font-family:'Vazirmatn',sans-serif;font-size:13px;
  outline:none;transition:border-color .2s;
}
.field-inp:focus{border-color:var(--gold-dim);}
.field-inp::placeholder{color:var(--text-dim);opacity:.5;}
.field-inp.err{border-color:var(--red) !important;}

/* Menu Categories */
.menu-section{padding:4px 15px 8px;}
.cat-block{margin-bottom:14px;}
.cat-head{
  display:flex;align-items:center;gap:9px;
  padding:8px 12px;margin-bottom:8px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;
}
.cat-emoji{
  width:30px;height:30px;border-radius:9px;
  background:var(--surface3);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;
}
.cat-name{color:var(--cream-dim);font-size:12.5px;font-weight:600;flex:1;}
.cat-count{color:var(--text-dim);font-size:11px;}

.item-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:13px;padding:12px 13px;margin-bottom:7px;
  transition:border-color .2s,background .2s;
  position:relative;overflow:hidden;
}
.item-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);
  opacity:0;transition:opacity .25s;
}
.item-card.sel{border-color:var(--gold-dim);background:linear-gradient(135deg,#1a1308,#100d05);}
.item-card.sel::before{opacity:1;}
.ic-top{display:flex;align-items:flex-start;gap:8px;}
.ic-name{flex:1;color:var(--text);font-size:13px;font-weight:500;line-height:1.4;}
.ic-price{
  background:var(--surface3);border:1px solid var(--border2);
  border-radius:8px;padding:3px 8px;
  color:var(--gold);font-size:11.5px;font-weight:600;white-space:nowrap;flex-shrink:0;
}
.item-card.sel .ic-price{background:#1e1508;border-color:var(--gold-dim);}
.ic-bot{display:flex;align-items:center;gap:8px;margin-top:8px;}
.ic-desc{flex:1;color:var(--text-dim);font-size:11.5px;line-height:1.5;}
.qty-ctrl{
  display:flex;align-items:center;
  background:#060402;border:1px solid var(--border);
  border-radius:20px;overflow:hidden;flex-shrink:0;
}
.qc-btn{
  width:32px;height:32px;border:none;background:transparent;
  color:var(--cream-dim);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.qc-btn:hover{background:var(--accent);color:var(--cream);}
.qc-num{min-width:28px;text-align:center;color:var(--cream);font-size:14px;font-weight:600;}

/* Summary Bar */
.order-footer{
  flex-shrink:0;background:linear-gradient(180deg,transparent,#0a0704);
  border-top:1px solid var(--border);padding:12px 15px;
}
.sum-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.sum-items{color:var(--text-dim);font-size:12px;}
.sum-total{color:var(--gold);font-size:15px;font-weight:700;}
.submit-btn{
  width:100%;padding:13px;border-radius:12px;
  background:linear-gradient(135deg,var(--accent),#7a3e14);
  border:none;color:var(--cream);
  font-family:'Vazirmatn',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;transition:opacity .2s,transform .1s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.submit-btn:hover{opacity:.9;transform:translateY(-1px);}
.submit-btn:disabled{background:var(--border);cursor:not-allowed;transform:none;opacity:.7;}
.spinner{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.3);border-top-color:var(--cream);animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════════════════ FEEDBACK ══════════════════════ */
.fb-body{flex:1;overflow-y:auto;padding:0 15px 15px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.fb-body::-webkit-scrollbar{width:3px;}
.fb-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.star-group{margin-bottom:16px;}
.star-label{color:var(--text-dim);font-size:12px;margin-bottom:7px;display:block;}
.stars-row{display:flex;gap:5px;direction:ltr;}
.star{font-size:26px;cursor:pointer;color:var(--border2);transition:color .12s,transform .1s;}
.star:hover{transform:scale(1.15);}
.star.on{color:var(--gold);}

.irb{background:var(--surface2);border:1px solid var(--border);border-radius:13px;padding:13px;margin-bottom:9px;}
.irb-name{color:var(--cream);font-size:13px;font-weight:500;margin-bottom:10px;}
.irb-cats{display:flex;gap:20px;flex-wrap:wrap;}
.irb-cat-label{color:var(--text-dim);font-size:10.5px;margin-bottom:5px;}
.irb-stars{display:flex;gap:3px;direction:ltr;}
.irb-star{font-size:19px;cursor:pointer;color:var(--border2);transition:color .12s;}
.irb-star.on{color:var(--gold);}

.fb-textarea{
  width:100%;background:#060402;border:1px solid var(--border);
  border-radius:10px;padding:10px 12px;color:var(--cream);
  font-family:'Vazirmatn',sans-serif;font-size:13px;outline:none;
  resize:none;min-height:74px;transition:border-color .2s;
}
.fb-textarea:focus{border-color:var(--gold-dim);}
.fb-textarea::placeholder{color:var(--text-dim);opacity:.5;}
.fb-footer{flex-shrink:0;border-top:1px solid var(--border);padding:12px 15px;}

/* ══════════════════════ UTILS ══════════════════════ */
.toast{
  position:absolute;top:80px;left:50%;transform:translateX(-50%);
  padding:9px 20px;border-radius:20px;
  font-size:12.5px;white-space:nowrap;z-index:99;
  opacity:0;pointer-events:none;transition:opacity .25s;
  background:#2a5a35;color:#a0e0b0;
}
.toast.err{background:var(--red);color:#f0b0b0;}
.toast.show{opacity:1;}

.empty-ico{font-size:36px;opacity:.3;}
.empty-lbl{color:var(--text-dim);font-size:12.5px;margin-top:8px;}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.shake{animation:shake .3s ease;}

@keyframes popIn{0%{transform:scale(.9);opacity:0}100%{transform:scale(1);opacity:1}}
.pop-in{animation:popIn .25s ease;}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ── HEADER ── -->
  <div class="header">
    <div class="logo">☕</div>
    <div class="header-info">
      <div class="header-name">کافه اینجا</div>
      <div class="header-sub"><span class="dot"></span><span class="header-status">دستیار آنلاین است</span></div>
    </div>
    <nav class="nav">
      <button class="nav-btn active" id="nb-chat"     onclick="switchView('chat')">    <span class="nb-icon">💬</span>چت</button>
      <button class="nav-btn"        id="nb-order"    onclick="switchView('order')">   <span class="nb-icon">🛒</span>سفارش</button>
      <button class="nav-btn"        id="nb-feedback" onclick="switchView('feedback')"><span class="nb-icon">⭐</span>نظر</button>
    </nav>
  </div>

<script>
// ══════════════════════ CONFIG ══════════════════════
const WORKER = "https://cafeinjaapi.boogh13822.workers.dev";

// ══════════════════════ STATE ══════════════════════
let chatBusy      = false;
let chatHistory   = [];
let currentMenu   = null;

// ══════════════════════ SECURITY ══════════════════════
function esc(s) {
  if (typeof s !== "string") return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
          .replace(/"/g,"&quot;").replace(/'/g,"&#x27;");
}
function sanitizeStr(s, max=500) {
  return typeof s === "string" ? s.trim().slice(0, max) : "";
}

// ══════════════════════ UTILS ══════════════════════
function hhmm() {
  const d = new Date();
  return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
}
function toastShow(msg, err=false) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show" + (err?" err":"");
  if (err) { el.classList.add("shake"); setTimeout(()=>el.classList.remove("shake"),350); }
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.className="toast"; }, 3200);
}
function errHandle(e, ctx="") {
  console.error("["+ctx+"]", e);
  const s = String(e?.status || "");
  if (s==="429") { toastShow("درخواست‌ها زیاد شد. یک دقیقه صبر کنید.", true); return; }
  if (e?.message?.includes("fetch")) { toastShow("ارتباط قطع است. اینترنت را بررسی کنید.", true); return; }
  toastShow("خطایی رخ داد. دوباره تلاش کنید.", true);
}

// ══════════════════════ VALIDATION ══════════════════════
function validPhone(p)  { return /^0\d{10}$/.test(p.replace(/\s/g,"")); }
function validTable(t)  { return /^\d{1,4}$/.test(t.trim()); }
function markErr(id)    {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add("err"); el.focus();
  setTimeout(()=>el.classList.remove("err"), 2000);
}

// ══════════════════════ VIEW SWITCH ══════════════════════

  if (name==="feedback") buildFeedbackView();
}

// ══════════════════════ CHAT: MESSAGES ══════════════════════
function addMsg(html, who, isHTML=false) {
  const msgs = document.getElementById("msgs");
  const wrap = document.createElement("div"); wrap.className="msg-wrap "+who+" pop-in";
  const row  = document.createElement("div"); row.className="msg-row";
  const av   = document.createElement("div"); av.className="av"; av.textContent=(who==="bot")?"☕":"👤";
  const bub  = document.createElement("div"); bub.className="bubble "+who;
  if (isHTML) bub.innerHTML = html;
  else bub.innerHTML = esc(html).replace(/\n/g,"<br>");
  row.appendChild(av); row.appendChild(bub);
  const t = document.createElement("div"); t.className="msg-time"; t.textContent=hhmm();
  wrap.appendChild(row); wrap.appendChild(t);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return bub;
}

function addMenuCard(menuData) {
  const msgs = document.getElementById("msgs");

  if (menuData.type === "menu") {
    // منوی کامل
    const wrap = document.createElement("div"); wrap.className="msg-wrap bot pop-in chat-full-menu";
    const container = document.createElement("div"); container.className="chat-menu";

    const hdr = document.createElement("div"); hdr.className="chat-menu-header";
    const htitle = document.createElement("span"); htitle.className="cmh-emoji"; htitle.textContent="📋";
    const ht2 = document.createElement("span"); ht2.className="cmh-title"; ht2.textContent="منوی کافه اینجا";
    hdr.appendChild(htitle); hdr.appendChild(ht2);
    container.appendChild(hdr);

    menuData.categories.forEach(cat => {
      // عنوان دسته
      const catHdr = document.createElement("div"); catHdr.className="chat-menu-header";
      catHdr.style.cssText="background:#0e0a06;padding:8px 14px;";
      const ce = document.createElement("span"); ce.className="cmh-emoji"; ce.style.fontSize="14px"; ce.textContent=cat.emoji||"•";
      const cn = document.createElement("span"); cn.className="cmh-title"; cn.style.fontSize="12px"; cn.textContent=cat.name;
      const cc = document.createElement("span"); cc.className="cmh-count"; cc.textContent=cat.items.length+" آیتم";
      catHdr.appendChild(ce); catHdr.appendChild(cn); catHdr.appendChild(cc);
      container.appendChild(catHdr);

      cat.items.forEach(item => {
        const row = document.createElement("div"); row.className="cmt-row";
        const left = document.createElement("div");
        const nm = document.createElement("div"); nm.className="cmt-name"; nm.textContent=item.name||"";
        left.appendChild(nm);
        if (item.description) {
          const ds = document.createElement("div"); ds.className="cmt-desc"; ds.textContent=item.description;
          left.appendChild(ds);
        }
        const pr = document.createElement("div"); pr.className="cmt-price";
        pr.textContent=Number(item.price).toLocaleString()+" ت";
        row.appendChild(left); row.appendChild(pr);
        container.appendChild(row);
      });
    });

    const foot = document.createElement("div"); foot.className="chat-menu-footer";
    foot.textContent = "برای سفارش از بخش 🛒 استفاده کنید";
    container.appendChild(foot);
    wrap.appendChild(container);
    const t = document.createElement("div"); t.className="msg-time"; t.textContent=hhmm();
    wrap.appendChild(t);
    msgs.appendChild(wrap);

  } else {
    // یک دسته
    const wrap = document.createElement("div"); wrap.className="msg-wrap bot pop-in";
    const container = document.createElement("div"); container.className="chat-menu";

    const hdr = document.createElement("div"); hdr.className="chat-menu-header";
    const em  = document.createElement("span"); em.className="cmh-emoji"; em.textContent=menuData.emoji||"•";
    const ttl = document.createElement("span"); ttl.className="cmh-title"; ttl.textContent=menuData.name||"";
    const cnt = document.createElement("span"); cnt.className="cmh-count"; cnt.textContent=(menuData.items||[]).length+" آیتم";
    hdr.appendChild(em); hdr.appendChild(ttl); hdr.appendChild(cnt);
    container.appendChild(hdr);

    (menuData.items||[]).forEach(item => {
      const row = document.createElement("div"); row.className="cmt-row";
      const left = document.createElement("div");
      const nm = document.createElement("div"); nm.className="cmt-name"; nm.textContent=item.name||"";
      left.appendChild(nm);
      if (item.description) {
        const ds = document.createElement("div"); ds.className="cmt-desc"; ds.textContent=item.description;
        left.appendChild(ds);
      }
      const pr = document.createElement("div"); pr.className="cmt-price";
      pr.textContent=Number(item.price).toLocaleString()+" ت";
      row.appendChild(left); row.appendChild(pr);
      container.appendChild(row);
    });

    const foot = document.createElement("div"); foot.className="chat-menu-footer";
    foot.textContent="برای سفارش از بخش 🛒 استفاده کنید";
    container.appendChild(foot);
    wrap.appendChild(container);
    const t = document.createElement("div"); t.className="msg-time"; t.textContent=hhmm();
    wrap.appendChild(t);
    msgs.appendChild(wrap);
  }
  msgs.scrollTop = msgs.scrollHeight;
}

// ── parse MENU_DATA from AI response ──
function parseMenuData(text) {
  const marker = "MENU_DATA:";
  const idx = text.indexOf(marker);
  if (idx === -1) return null;
  try {
    const jsonStr = text.slice(idx + marker.length).trim();
    const end = findJsonEnd(jsonStr);
    const parsed = JSON.parse(jsonStr.slice(0, end));
    if (parsed && (parsed.type === "menu" || parsed.type === "category")) return parsed;
  } catch {}
  return null;
}
function findJsonEnd(s) {
  let depth=0, inStr=false, escape=false;
  for (let i=0;i<s.length;i++) {
    const c = s[i];
    if (escape) { escape=false; continue; }
    if (c==="\\") { escape=true; continue; }
    if (c==='"') inStr=!inStr;
    if (!inStr) { if (c==='{'||c==='[') depth++; else if (c==='}'||c===']') { depth--; if (depth===0) return i+1; } }
  }
  return s.length;
}

function showTyping() {
  hideTyping();
  const msgs = document.getElementById("msgs");
  const w = document.createElement("div"); w.id="typing"; w.className="msg-wrap bot";
  const r = document.createElement("div"); r.className="typing-row";
  const av= document.createElement("div"); av.className="av"; av.textContent="☕";
  const b = document.createElement("div"); b.className="typing-bub";
  b.innerHTML="<span></span><span></span><span></span>";
  r.appendChild(av); r.appendChild(b); w.appendChild(r);
  msgs.appendChild(w); msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping() { const el=document.getElementById("typing"); if(el) el.remove(); }

function setLoading(v) {
  chatBusy=v;
  document.getElementById("sendBtn").disabled=v;
  document.getElementById("chat-inp").disabled=v;
}

// ══════════════════════ AI STREAM ══════════════════════
async function callAIStream(text) {
  chatHistory.push({ role:"user", content:text });

  const res = await fetch(WORKER+"/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      messages: chatHistory,
      stream: true,
      orderId: activeOrderId || undefined
    })
  });

  if (!res.ok) {
    let e={}; try { e=await res.json(); } catch {}
    throw { status:res.status, message:e.error||res.statusText };
  }

  hideTyping();

  const reader  = res.body.getReader();
  const decoder = new TextDecoder();
  let fullText  = "";
  let buffer    = "";

  // bubble ساخته بشه
  const msgs = document.getElementById("msgs");
  const wrap = document.createElement("div"); wrap.className="msg-wrap bot pop-in";
  const row  = document.createElement("div"); row.className="msg-row";
  const av   = document.createElement("div"); av.className="av"; av.textContent="☕";
  const bub  = document.createElement("div"); bub.className="bubble bot";
  bub.textContent="…";
  row.appendChild(av); row.appendChild(bub);
  const t = document.createElement("div"); t.className="msg-time"; t.textContent=hhmm();
  wrap.appendChild(row); wrap.appendChild(t);
  msgs.appendChild(wrap);
  msgs.scrollTop=msgs.scrollHeight;

  let isMenuResponse = false; // تا stream تمام نشه نمی‌دونیم menu هست یا نه

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value,{stream:true});
    const lines = buffer.split("\n");
    buffer = lines.pop() || "";
    for (const line of lines) {
      if (!line.startsWith("data: ")) continue;
      const raw = line.slice(6).trim();
      if (raw==="[DONE]") continue;
      try {
        const p = JSON.parse(raw);
        const c = p.choices?.[0]?.delta?.content || "";
        if (c) {
          fullText += c;
          // اگه MENU_DATA در متن شروع شده bubble رو مخفی کن
          if (fullText.includes("MENU_DATA:")) {
            isMenuResponse = true;
            bub.style.display = "none"; // مخفی — در پایان جدول می‌سازیم
          } else if (!isMenuResponse) {
            bub.innerHTML = esc(fullText).replace(/\n/g,"<br>");
            msgs.scrollTop=msgs.scrollHeight;
          }
        }
      } catch {}
    }
  }

  // پاکسازی
  fullText = fullText.replace(/<think>[\s\S]*?<\/think>/gi,"").trim();
  if (!fullText) fullText = "متوجه نشدم، می‌شه دوباره بپرسید؟";

  // بررسی MENU_DATA
  const menuData = parseMenuData(fullText);
  if (menuData) {
    wrap.remove(); // bubble متنی رو کامل حذف کن
    // متن قبل از MENU_DATA (اگه بود)
    const beforeMarker = fullText.slice(0, fullText.indexOf("MENU_DATA:")).trim();
    if (beforeMarker) addMsg(beforeMarker, "bot");
    addMenuCard(menuData);
  } else {
    bub.style.display = "";
    bub.innerHTML = esc(fullText).replace(/\n/g,"<br>");
  }
  msgs.scrollTop=msgs.scrollHeight;
  chatHistory.push({ role:"assistant", content:fullText });
  return fullText;
}

async function sendMsg() {
  if (chatBusy) return;
  const inp  = document.getElementById("chat-inp");
  const text = sanitizeStr(inp.value, 500);
  if (!text) return;
  inp.value="";
  addMsg(text, "user");
  setLoading(true);
  showTyping();
  try {
    await callAIStream(text);
  } catch(e) {
    hideTyping();
    errHandle(e, "sendMsg");
    addMsg("مشکلی پیش اومد. لطفاً دوباره تلاش کنید.", "bot");
  } finally {
    setLoading(false);
  }
}

function toggleQA() {
  const grid   = document.getElementById("qaGrid");
  const toggle = document.getElementById("qaToggle");
  const open   = grid.classList.toggle("open");

  toggle.textContent = open ? "✕" : "⚡";
}

// بستن QA وقتی chip/btn کلیک شد
document.addEventListener("click", e => {
  const grid = document.getElementById("qaGrid");
  if (!grid) return;
  if (e.target.closest(".qa-btn") && grid.classList.contains("open")) {
    grid.classList.remove("open");
    const toggle = document.getElementById("qaToggle");
    if (toggle) { toggle.classList.remove("open"); toggle.textContent="⚡"; }
  }
});

function quickSend(text) {
  if (chatBusy) return;
  switchView("chat");
  document.getElementById("chat-inp").value = text;
  sendMsg();
}

function askOrderStatus() {

// ══════════════════════ MENU LOADER ══════════════════════
async function loadMenu() {
  if (currentMenu) return;

    const res = await fetch(WORKER+"/menu", { cache:"default" });
    if (!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();
    if (!data.categories?.length) throw new Error("invalid");
    currentMenu = data;
  } catch(e) {
    errHandle(e,"loadMenu");
  }
}

function saveOrderState() {

    localStorage.setItem("cafe_order_v2", JSON.stringify({

      customer:{
        name:  document.getElementById("o-name")?.value||"",
        table: document.getElementById("o-table")?.value||"",
        phone: document.getElementById("o-phone")?.value||""

function restoreOrderState() {
  try {
    const raw = localStorage.getItem("cafe_order_v2");
    if (!raw) return;
    const d = JSON.parse(raw);
    orderQty      = d.orderQty      || {};
    lastOrder     = d.lastOrder     || null;
    activeOrderId = d.activeOrderId || null;
    if (d.customer) {
      const n=document.getElementById("o-name");
      const t=document.getElementById("o-table");
      const p=document.getElementById("o-phone");
      if (n) n.value=d.customer.name||"";
      if (t) t.value=d.customer.table||"";
      if (p) p.value=d.customer.phone||"";
    }
    if (activeOrderId) startOrderTimer(activeOrderId);
  } catch {}
}

async function buildOrderMenu() {
  await loadMenu();
  const list = document.getElementById("menuList");
  if (!currentMenu) {
    list.innerHTML='<div style="text-align:center;padding:24px 0"><span style="color:var(--text-dim)">❌ خطا در بارگذاری منو</span></div>';
    return;
  }
  list.innerHTML="";
  currentMenu.categories.forEach(cat => {
    const block = document.createElement("div"); block.className="cat-block";

    const head = document.createElement("div"); head.className="cat-head";
    const em   = document.createElement("div"); em.className="cat-emoji"; em.textContent=cat.emoji;
    const nm   = document.createElement("span"); nm.className="cat-name"; nm.textContent=cat.name;
    const cnt  = document.createElement("span"); cnt.className="cat-count"; cnt.textContent=cat.items.length+" آیتم";
    head.appendChild(em); head.appendChild(nm); head.appendChild(cnt);
    block.appendChild(head);

    cat.items.forEach(item => {
      const qty  = orderQty[item.name]||0;
      const card = document.createElement("div");
      card.className="item-card"+(qty>0?" sel":"");
      card.id="card-"+CSS.escape(item.name);

      const top   = document.createElement("div"); top.className="ic-top";
      const name  = document.createElement("span"); name.className="ic-name"; name.textContent=item.name;
      const price = document.createElement("span"); price.className="ic-price"; price.textContent=Number(item.price).toLocaleString()+" ت";
      top.appendChild(name); top.appendChild(price);

      const bot  = document.createElement("div"); bot.className="ic-bot";
      const desc = document.createElement("div"); desc.className="ic-desc"; desc.textContent=item.description||"";

      const ctrl = document.createElement("div"); ctrl.className="qty-ctrl";
      const bm   = document.createElement("button"); bm.className="qc-btn"; bm.textContent="−";
      bm.setAttribute("aria-label","کم کردن "+item.name);
      bm.onclick=()=>changeQty(item.name,item.price,-1);
      const qn   = document.createElement("span"); qn.className="qc-num"; qn.id="qty-"+CSS.escape(item.name); qn.textContent=qty;
      const bp   = document.createElement("button"); bp.className="qc-btn"; bp.textContent="+";
      bp.setAttribute("aria-label","اضافه کردن "+item.name);
      bp.onclick=()=>changeQty(item.name,item.price,1);
      ctrl.appendChild(bm); ctrl.appendChild(qn); ctrl.appendChild(bp);

      bot.appendChild(desc); bot.appendChild(ctrl);
      card.appendChild(top); card.appendChild(bot);
      block.appendChild(card);
    });
    list.appendChild(block);
  });
  updateSummary();
}

function changeQty(name, price, delta) {
  const cur  = orderQty[name]||0;
  const next = Math.max(0, Math.min(20, cur+delta));
  if (next===0) delete orderQty[name]; else orderQty[name]=next;
  const qn=document.getElementById("qty-"+CSS.escape(name));
  if (qn) qn.textContent=next;
  const card=document.getElementById("card-"+CSS.escape(name));
  if (card) card.classList.toggle("sel", next>0);
  updateSummary();
  saveOrderState();
}

function updateSummary() {
  const entries=Object.entries(orderQty).filter(([,q])=>q>0);
  const si=document.getElementById("sumItems");
  const st=document.getElementById("sumTotal");
  if (!entries.length||!currentMenu) {
    si.textContent="هیچ آیتمی انتخاب نشده"; st.textContent=""; return;
  }
  let total=0, count=0;
  entries.forEach(([name,qty])=>{
    count+=qty;
    const item=currentMenu.categories.flatMap(c=>c.items).find(i=>i.name===name);
    if (item) total+=item.price*qty;
  });
  si.textContent=count+" آیتم انتخاب شده";
  st.textContent=total.toLocaleString()+" تومان";
}

async function submitOrder() {
  const name  = document.getElementById("o-name").value.trim();
  const table = document.getElementById("o-table").value.trim();
  const phone = document.getElementById("o-phone").value.trim();

  if (!name)               { toastShow("نام را وارد کنید",true); markErr("o-name");  return; }
  if (!validTable(table))  { toastShow("شماره میز معتبر نیست",true); markErr("o-table"); return; }
  if (!validPhone(phone))  { toastShow("شماره تماس باید با ۰ شروع شه و ۱۱ رقم باشه",true); markErr("o-phone"); return; }

  const entries=Object.entries(orderQty).filter(([,q])=>q>0);
  if (!entries.length) { toastShow("حداقل یک آیتم انتخاب کنید",true); return; }

  const items=entries.map(([n,qty])=>{
    const item=currentMenu.categories.flatMap(c=>c.items).find(i=>i.name===n);
    return { name:n, qty, price:item?.price||0 };
  });

  const btn=document.getElementById("orderBtn");
  btn.disabled=true;
  btn.innerHTML='در حال ثبت... <span class="spinner"></span>';

  try {
    const res=await fetch(WORKER+"/order",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({name,table,phone,items})
    });
    if (!res.ok) { let e={}; try{e=await res.json();}catch{} throw {status:res.status,message:e.error||""}; }
    const data=await res.json();

    if (data.success) {
      switchView("chat");
      const total=items.reduce((s,i)=>s+i.price*i.qty,0);
      const msgs=document.getElementById("msgs");
      const wrap=document.createElement("div"); wrap.className="msg-wrap bot pop-in";
      const row =document.createElement("div"); row.className="msg-row";
      const av  =document.createElement("div"); av.className="av"; av.textContent="☕";
      const card=document.createElement("div"); card.className="order-confirm";

      const oh=document.createElement("div"); oh.className="oc-head";
      const ot=document.createElement("span"); ot.className="oc-title"; ot.textContent="✅ سفارش ثبت شد";
      const oi=document.createElement("span"); oi.className="oc-id"; oi.textContent=data.orderId;
      oh.appendChild(ot); oh.appendChild(oi);

      const om=document.createElement("div"); om.className="oc-meta";
      om.textContent="👤 "+name+" | 🪑 میز "+table;

      const od=document.createElement("div"); od.className="oc-divider";
      card.appendChild(oh); card.appendChild(om); card.appendChild(od);

      items.forEach(i=>{
        const r=document.createElement("div"); r.className="oc-row";
        const l=document.createElement("span"); l.textContent=i.name+" × "+i.qty;
        const p=document.createElement("span"); p.textContent=(i.price*i.qty).toLocaleString()+" ت";
        r.appendChild(l); r.appendChild(p); card.appendChild(r);
      });

      const tf=document.createElement("div"); tf.className="oc-total";
      const tl=document.createElement("span"); tl.textContent="جمع کل";
      const tv=document.createElement("span"); tv.textContent=total.toLocaleString()+" تومان";
      tf.appendChild(tl); tf.appendChild(tv); card.appendChild(tf);

      row.appendChild(av); row.appendChild(card);
      wrap.appendChild(row);
      const t=document.createElement("div"); t.className="msg-time"; t.textContent=hhmm();
      wrap.appendChild(t);
      msgs.appendChild(wrap);
      msgs.scrollTop=msgs.scrollHeight;

      lastOrder={name,table,phone,items};
      activeOrderId=data.orderId;
      startOrderTimer(data.orderId);

      // نمایش دکمه وضعیت سفارش در quick actions
      const qao=document.getElementById("qa-order-status");
      if (qao) qao.style.display="";

      orderQty={};
      document.getElementById("o-name").value="";
      document.getElementById("o-table").value="";
      document.getElementById("o-phone").value="";
      updateSummary();
      saveOrderState();
      toastShow("سفارش با موفقیت ثبت شد ✅");
    } else {
      toastShow(data.error||"خطا در ثبت سفارش",true);
    }
  } catch(e) {
    errHandle(e,"submitOrder");
  } finally {
    btn.disabled=false;
    btn.textContent="ثبت سفارش";
  }
}

// ══════════════════════ TIMER ══════════════════════
function renderTimerBanner(data) {
  const slot=document.getElementById("timer-banner-slot");
  slot.innerHTML="";
  if (!data?.found) return;

  const banner=document.createElement("div"); banner.className="timer-banner";
  const icon=document.createElement("div"); icon.className="tb-icon";
  const info=document.createElement("div"); info.className="tb-info";
  const lbl =document.createElement("div"); lbl.className="tb-label"; lbl.textContent="سفارش "+data.orderId;
  const val =document.createElement("div"); val.className="tb-val";
  const sub =document.createElement("div"); sub.className="tb-sub";

  if (data.isReady) {
    icon.textContent="✅"; val.textContent="آماده تحویل"; val.className="tb-val ready";
    sub.textContent="لطفاً از پیشخوان تحویل بگیرید";
  } else if (data.remaining!==null) {
    icon.textContent="⏱"; val.textContent=data.remaining+" دقیقه";
    sub.textContent="زمان تقریبی آماده‌سازی";
  } else {
    icon.textContent="🔄"; val.textContent=data.elapsedMin+" دقیقه گذشت";
    sub.textContent="در حال آماده‌سازی...";
  }

  info.appendChild(lbl); info.appendChild(val); info.appendChild(sub);
  banner.appendChild(icon); banner.appendChild(info);
  slot.appendChild(banner);
}

async function pollOrderStatus() {
  if (!activeOrderId) return;
  try {
    const res=await fetch(WORKER+"/order-status?id="+activeOrderId);
    if (!res.ok) return;
    timerData=await res.json();
    renderTimerBanner(timerData);
    if (timerData.isReady) setTimeout(()=>{ if(timerInterval){clearInterval(timerInterval);timerInterval=null;} },5*60*1000);
  } catch {}
}

function startOrderTimer(id) {
  activeOrderId=id;
  pollOrderStatus();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval=setInterval(pollOrderStatus, 30000);
}

// ══════════════════════ FEEDBACK ══════════════════════
function buildFeedbackView() {
  buildGStars("stars-staff","staff");
  buildGStars("stars-ambiance","ambiance");
  if (lastOrder) {
    const fn=document.getElementById("f-name");
    const ft=document.getElementById("f-table");
    if (fn) fn.value=lastOrder.name||"";
    if (ft) ft.value=lastOrder.table||"";
  }
  const container=document.getElementById("fbItemList");
  if (!lastOrder?.items?.length) {
    container.innerHTML='<div style="color:var(--text-dim);font-size:12.5px;padding:4px 0 12px;">هیچ سفارشی ثبت نشده — می‌توانید بدون آیتم هم نظر بدهید</div>';
    return;
  }
  container.innerHTML="";
  lastOrder.items.forEach(item=>{
    const block=document.createElement("div"); block.className="irb";
    const nm=document.createElement("div"); nm.className="irb-name"; nm.textContent=item.name;
    const cats=document.createElement("div"); cats.className="irb-cats";
    ["taste","look","quality"].forEach(asp=>{
      const cd=document.createElement("div"); cd.className="irb-cat";
      const lb=document.createElement("div"); lb.className="irb-cat-label";
      lb.textContent=asp==="taste"?"طعم":asp==="look"?"ظاهر":"کیفیت";
      const sr=document.createElement("div"); sr.className="irb-stars";
      sr.id="irs-"+CSS.escape(item.name)+"-"+asp;
      cd.appendChild(lb); cd.appendChild(sr);
      cats.appendChild(cd);
    });
    block.appendChild(nm); block.appendChild(cats);
    container.appendChild(block);
    buildIStars(item.name,"taste");
    buildIStars(item.name,"look");
    buildIStars(item.name,"quality");
  });
}

function buildGStars(cid, key) {
  const c=document.getElementById(cid); if(!c) return; c.innerHTML="";
  for (let i=1;i<=5;i++) {
    const s=document.createElement("span"); s.className="star"+(ratings[key]>=i?" on":""); s.textContent="★";
    s.onclick=()=>setRating(key,i,cid,"star");
    c.appendChild(s);
  }
}
function buildIStars(name, asp) {
  const key=name+"-"+asp, cid="irs-"+CSS.escape(name)+"-"+asp;
  const c=document.getElementById(cid); if(!c) return; c.innerHTML="";
  for (let i=1;i<=5;i++) {
    const s=document.createElement("span"); s.className="irb-star"+(ratings[key]>=i?" on":""); s.textContent="★";
    s.onclick=()=>setRating(key,i,cid,"irb-star");
    c.appendChild(s);
  }
}
function setRating(key,val,cid,cls) {
  ratings[key]=val;
  const c=document.getElementById(cid); if(!c) return;
  c.querySelectorAll("."+cls).forEach((s,i)=>s.classList.toggle("on",i<val));
}

async function submitFeedback() {
  const name     = document.getElementById("f-name").value.trim()||"ناشناس";
  const table    = document.getElementById("f-table").value.trim()||"";
  const positive = document.getElementById("f-positive").value.trim();
  const negative = document.getElementById("f-negative").value.trim();
  const comment  = document.getElementById("f-comment").value.trim();
  const phone    = lastOrder?.phone||"";

  if (table && !validTable(table)) { toastShow("شماره میز معتبر نیست",true); markErr("f-table"); return; }

  const itemSource=lastOrder?.items||[];
  const itemRatings=itemSource.map(item=>({
    name:item.name,
    taste:ratings[item.name+"-taste"]||0,
    look:ratings[item.name+"-look"]||0,
    quality:ratings[item.name+"-quality"]||0
  })).filter(r=>r.taste||r.look||r.quality);

  const staff=ratings["staff"]||0, ambiance=ratings["ambiance"]||0;
  if (!staff&&!ambiance&&!itemRatings.length&&!comment&&!positive&&!negative) {
    toastShow("لطفاً حداقل یک امتیاز یا نظر وارد کنید",true); return;
  }

  const btn=document.getElementById("fbBtn");
  btn.disabled=true;
  btn.innerHTML='در حال ثبت... <span class="spinner"></span>';

  try {
    const res=await fetch(WORKER+"/feedback",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({name,table,phone,itemRatings,staff,ambiance,positive,negative,comment})
    });
    if (!res.ok) { let e={}; try{e=await res.json();}catch{} throw {status:res.status,message:e.error||""}; }
    const data=await res.json();
    if (data.success) {
      switchView("chat");
      addMsg("ممنون از وقتی که گذاشتید 🙏\nنظر شما برای بهتر شدن کافه اینجا ارزشمنده.", "bot");
      ratings={};
      ["f-name","f-table","f-positive","f-negative","f-comment"].forEach(id=>{
        const el=document.getElementById(id); if(el) el.value="";
      });
      buildGStars("stars-staff","staff");
      buildGStars("stars-ambiance","ambiance");
      toastShow("نظر شما ثبت شد ✅");
    } else {
      toastShow(data.error||"خطا در ثبت نظر",true);
    }
  } catch(e) {
    errHandle(e,"submitFeedback");
  } finally {
    btn.disabled=false;
    btn.textContent="ثبت نظر";
  }
}

// ══════════════════════ INIT ══════════════════════
window.addEventListener("DOMContentLoaded", () => {
  restoreOrderState();
  loadMenu();
  // اگه سفارش فعال بود، دکمه وضعیت رو نشون بده
  if (activeOrderId) {
    const qao=document.getElementById("qa-order-status");
    if (qao) qao.style.display="";
  }
  addMsg("سلام! ☕\nبه کافه اینجا خوش اومدید.\nچطور می‌تونم کمکتون کنم؟","bot");
});
</script>
