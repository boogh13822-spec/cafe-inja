```html
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اینجا کافه دستیار</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
box-sizing:border-box;
font-family:Vazirmatn,sans-serif;
}

body{
margin:0;
background:#f5f0e8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:100%;
max-width:500px;
height:90vh;
background:#fff;
border-radius:20px;
overflow:hidden;
display:flex;
flex-direction:column;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.header{
background:#1a1008;
color:#fff;
padding:15px;
font-weight:600;
text-align:center;
}

.messages{
flex:1;
overflow-y:auto;
padding:15px;
background:#f5f0e8;
}

.msg{
display:flex;
margin-bottom:10px;
}

.msg.user{
justify-content:flex-end;
}

.bubble{
max-width:80%;
padding:10px 14px;
border-radius:14px;
line-height:1.8;
word-wrap:break-word;
background:#fff;
}

.msg.user .bubble{
background:#1a1008;
color:#fff;
}

.input{
display:flex;
padding:10px;
background:#fff;
border-top:1px solid #ddd;
}

.input input{
flex:1;
padding:12px;

}

width:48px;
height:48px;
border:none;
border-radius:50%;
background:#1a1008;
color:white;

margin-right:8px;

}
</style>
</head>

<body>

<div class="app">

<div class="header">
☕ کافه اینجا - دستیار هوشمند
</div>

<div class="messages" id="msgs"></div>

<div class="input">
<input
id="chat"
placeholder="پیام خود را بنویسید..."
onkeydown="if(event.key==='Enter')send()"
/>

<button onclick="send()">➤</button>
</div>

</div>

<script>

const WORKER_URL = "https://cafeinjaapi.boogh13822.workers.dev";

let history = [];

const SYS = `
تو دستیار رسمی کافه هستی.

قوانین:
- همیشه فارسی جواب بده
- کاربر را "میهمان" خطاب کن
- اطلاعات غیرمنو را حدس نزن
- فقط از منوی زیر استفاده کن

منو:

☕ نوشیدنی‌های داغ:
- اسپرسو: 180,000
- آمریکانو: 183,000
- لاته: 256,000
- کاپوچینو: 251,000
- موکا: 287,000

🧊 نوشیدنی‌های سرد:
- آیس لاته: 256,000
- موهیتو: 218,000
- لیموناد: 218,000

🍔 غذا:
- برگر: 527,000
- چیزبرگر: 574,000
- پیتزا آلفردو: 786,000
- پاستا آلفردو: 627,000

🍰 دسر:
- تیرامیسو: 259,000
- کروسان: 275,000

اگر چیزی نبود بگو:
"متأسفانه در منو موجود نیست"
`;

function add(text, cls){

const div = document.createElement("div");
div.className = "msg " + cls;

div.innerHTML =
`<div class="bubble">${text.replace(/\n/g,"<br>")}</div>`;

const msgs = document.getElementById("msgs");

msgs.appendChild(div);
msgs.scrollTop = msgs.scrollHeight;
}

async function callAI(text){

history.push({
role:"user",
content:text
});

const res = await fetch(WORKER_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
messages:[
{
role:"system",
content:SYS
},
...history
]
})
});

const data = await res.json();

console.log(data);

if(!res.ok){
throw new Error(
data?.error?.message ||
data?.details?.error?.message ||
"خطای سرور"
);
}

const reply =
data?.choices?.[0]?.message?.content ||
"پاسخی دریافت نشد";

history.push({
role:"assistant",
content:reply
});

return reply;
}

async function send(){

const input = document.getElementById("chat");

const text = input.value.trim();

if(!text) return;

input.value = "";

add(text,"user");

try{

const reply = await callAI(text);

add(reply,"bot");

}catch(err){

console.error(err);

add("❌ " + err.message,"bot");
}
}

window.onload = () => {

add(
"سلام میهمان عزیز ☕\nبه کافه اینجا خوش آمدید.",
"bot"
);

};

</script>

</body>
</html>
